<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Money Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        
        html, body { 
            font-family: 'Prompt', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f1f5f9; 
            height: 100%;
            overflow: hidden; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, select, textarea, button { font-size: 16px !important; outline: none !important; }
        
        .app-wrapper {
            width: 100%;
            height: 100dvh;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        .main-content {
            flex: 1 1 auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .bottom-nav {
            flex: 0 0 auto;
        }

        @media (min-width: 640px) {
            .app-wrapper {
                max-width: 400px;
                height: 90vh;
                margin: 5vh auto;
                border-radius: 1.5rem;
                border: 1px solid #e2e8f0;
            }
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-blue-200">
    
    <div id="root" class="app-wrapper">
        <!-- ระบบป้องกันจอขาว: แสดงหน้านี้จนกว่า React จะโหลดเสร็จ -->
        <div id="loading-screen" class="flex flex-col items-center justify-center h-full space-y-4">
            <div class="w-8 h-8 border-4 border-slate-300 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="text-sm text-slate-500 font-medium">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONS ---
        const Icons = {
          Home: ({active}) => <svg className="w-5 h-5" fill={active ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24" strokeWidth={active ? "0" : "2"}><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
          List: ({active}) => <svg className="w-5 h-5" fill={active ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24" strokeWidth={active ? "0.5" : "2"}><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>,
          Plus: () => <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>,
          Settings: ({active}) => <svg className="w-5 h-5" fill={active ? "currentColor" : "none"} stroke="currentColor" viewBox="0 0 24 24" strokeWidth={active ? "0.5" : "2"}><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
          Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
          Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>,
          Download: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>,
          File: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
          Close: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        };

        // --- CONFIG & COLORS ---
        const THEMES = {
          blue: { id: 'blue', hex: '#3b82f6', primary: 'bg-blue-500', text: 'text-blue-500' },
          emerald: { id: 'emerald', hex: '#10b981', primary: 'bg-emerald-500', text: 'text-emerald-500' },
          orange: { id: 'orange', hex: '#f97316', primary: 'bg-orange-500', text: 'text-orange-500' },
          slate: { id: 'slate', hex: '#334155', primary: 'bg-slate-700', text: 'text-slate-700' },
        };

        const DEFAULT_CAT = {
          income: ['เงินเดือน', 'รายได้เสริม', 'โบนัส', 'อื่นๆ'],
          expense: ['อาหารและเครื่องดื่ม', 'การเดินทาง', 'ของใช้ส่วนตัว', 'บิลและค่าเช่า', 'ช้อปปิ้ง', 'อื่นๆ']
        };

        const PIE_COLORS = ['#3b82f6', '#f43f5e', '#f59e0b', '#10b981', '#8b5cf6', '#06b6d4', '#ec4899', '#64748b'];

        // --- HELPERS ---
        const formatCurrency = (amt) => new Intl.NumberFormat('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(amt);
        const getMY = (ds) => new Date(ds).toISOString().substring(0, 7);
        const formatDateText = (ds) => new Date(ds).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

        // --- COMPONENTS ---
        const DonutChart = ({ data }) => {
          if (data.length === 0) return <div className="text-center text-slate-400 py-6 text-xs bg-slate-50 rounded-xl border border-slate-200 border-dashed">ยังไม่มีข้อมูลรายจ่าย</div>;
          let curr = 0;
          const stops = data.map((it, i) => {
            const s = curr; const e = curr + it.percentage; curr = e;
            return `${PIE_COLORS[i % PIE_COLORS.length]} ${s}% ${e}%`;
          });
          return (
            <div className="flex items-center gap-5 mt-3">
              <div className="w-20 h-20 rounded-full flex-shrink-0 relative shadow-sm" style={{ background: `conic-gradient(${stops.join(', ')})` }}>
                <div className="absolute inset-2.5 bg-white rounded-full flex flex-col items-center justify-center">
                    <span className="text-[8px] font-bold text-slate-400 uppercase">EXP</span>
                </div>
              </div>
              <div className="flex-1 space-y-2">
                {data.slice(0, 4).map((it, i) => (
                  <div key={it.category} className="flex justify-between items-center text-xs">
                    <div className="flex items-center gap-2 truncate">
                      <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: PIE_COLORS[i % PIE_COLORS.length] }}></span>
                      <span className="text-slate-700 font-medium truncate">{it.category}</span>
                    </div>
                    <span className="font-bold text-slate-800 ml-2">{it.percentage.toFixed(0)}%</span>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        // --- MAIN APP ---
        function App() {
          const [tab, setTab] = useState('dashboard');
          
          // ใช้ try-catch ป้องกันจอขาวกรณี LocalStorage พัง
          const [tx, setTx] = useState(() => {
              try { return JSON.parse(localStorage.getItem('min_tx')) || []; } 
              catch(e) { return []; }
          });
          const [cats, setCats] = useState(() => {
              try { return JSON.parse(localStorage.getItem('min_cat')) || DEFAULT_CAT; } 
              catch(e) { return DEFAULT_CAT; }
          });
          const [budget, setBudget] = useState(() => {
              try { return Number(localStorage.getItem('min_budget')) || 10000; } 
              catch(e) { return 10000; }
          });
          const [theme, setTheme] = useState(() => {
              try { return THEMES[localStorage.getItem('min_theme')] || THEMES.blue; } 
              catch(e) { return THEMES.blue; }
          });
          
          const [month, setMonth] = useState(getMY(new Date()));
          const [modal, setModal] = useState(null);
          
          const [form, setForm] = useState({ type: 'expense', amount: '', category: '', note: '', date: new Date().toISOString().split('T')[0] });
          const [editingTx, setEditingTx] = useState(null); 
          const [newCat, setNewCat] = useState({ type: 'expense', name: '' });

          useEffect(() => {
            localStorage.setItem('min_tx', JSON.stringify(tx));
            localStorage.setItem('min_cat', JSON.stringify(cats));
            localStorage.setItem('min_budget', budget.toString());
            localStorage.setItem('min_theme', theme.id);
            
            // ลบหน้าจอโหลดออกเมื่อ React พร้อมทำงาน
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';
          }, [tx, cats, budget, theme]);

          const filtered = useMemo(() => tx.filter(t => t.date.startsWith(month)).sort((a,b) => new Date(b.date)-new Date(a.date)), [tx, month]);
          const summary = useMemo(() => {
            let inc = 0, exp = 0; const byCat = {};
            filtered.forEach(t => {
              if (t.type === 'income') inc += t.amount;
              else { exp += t.amount; byCat[t.category] = (byCat[t.category] || 0) + t.amount; }
            });
            const pie = Object.keys(byCat).map(c => ({ category: c, amount: byCat[c], percentage: (byCat[c]/exp)*100 })).sort((a,b)=>b.amount-a.amount);
            return { inc, exp, bal: inc - exp, pie };
          }, [filtered]);

          const handleAdd = (e) => {
            e.preventDefault(); 
            if(!form.amount || !form.category) return;
            setTx([{...form, amount: Number(form.amount), id: Date.now().toString()}, ...tx]);
            setForm({...form, amount: '', note: ''}); 
            setTab('list');
          };

          const handleUpdate = (e) => {
            e.preventDefault();
            if(!editingTx.amount || !editingTx.category) return;
            setTx(tx.map(t => t.id === editingTx.id ? {...editingTx, amount: Number(editingTx.amount)} : t));
            setEditingTx(null);
          };

          return (
            <React.Fragment>
              {/* Header */}
              <header className={`${theme.primary} px-5 py-4 flex justify-between items-center z-10 text-white shadow-md flex-shrink-0`}>
                <div className="flex flex-col">
                    <h1 className="text-lg font-bold tracking-tight">Minimal Money</h1>
                </div>
                <div className="relative rounded-lg bg-white/20">
                  <input type="month" value={month} onChange={e=>setMonth(e.target.value)} className="bg-transparent border-none text-xs font-bold px-2 py-1 outline-none text-white cursor-pointer"/>
                </div>
              </header>

              {/* Main Content (Scrollable) */}
              <main className="main-content px-4 pt-4 pb-6 no-scrollbar">
                
                {tab === 'dashboard' && (
                  <div className="space-y-4 animate-in fade-in duration-300">
                    <div className={`${theme.primary} rounded-2xl p-5 text-white shadow-md relative overflow-hidden`}>
                       <div className="absolute -right-4 -top-6 w-24 h-24 border-2 border-white/20 rounded-full"></div>
                       <div className="relative z-10">
                           <p className="text-xs font-medium opacity-80 mb-1">ยอดเงินคงเหลือ</p>
                           <h2 className="text-3xl font-bold tracking-tight">฿{formatCurrency(summary.bal)}</h2>
                       </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                       <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                          <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">รายรับ</p>
                          <p className="text-emerald-600 font-bold text-lg">฿{formatCurrency(summary.inc)}</p>
                       </div>
                       <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                          <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mb-1">รายจ่าย</p>
                          <p className="text-rose-600 font-bold text-lg">฿{formatCurrency(summary.exp)}</p>
                       </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                       <div className="flex justify-between items-end mb-2">
                          <p className="text-xs font-bold text-slate-600">งบประมาณ</p>
                          <p className={`font-bold text-sm ${summary.exp > budget ? 'text-rose-600' : 'text-slate-800'}`}>
                              ฿{formatCurrency(summary.exp)} <span className="text-[10px] text-slate-400 font-medium">/ {formatCurrency(budget)}</span>
                          </p>
                       </div>
                       <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                          <div className={`h-full rounded-full transition-all duration-500 ${summary.exp > budget ? 'bg-rose-500' : theme.primary}`} style={{width: `${Math.min((summary.exp/budget)*100, 100)}%`}}></div>
                       </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                       <h4 className="text-xs font-bold text-slate-600 mb-1">สัดส่วนรายจ่าย</h4>
                       <DonutChart data={summary.pie} />
                    </div>
                  </div>
                )}

                {tab === 'list' && (
                  <div className="space-y-3 animate-in fade-in duration-300">
                    <h3 className="text-[11px] font-bold text-slate-500 px-1 uppercase tracking-widest">รายการทั้งหมด ({filtered.length})</h3>
                    {filtered.length === 0 ? <p className="text-center py-10 text-slate-400 text-xs">ไม่มีข้อมูลในเดือนนี้</p> : 
                    <div className="space-y-2">
                        {filtered.map(t => (
                          <div key={t.id} className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center group">
                            <div className="flex items-center gap-3 min-w-0">
                              <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 font-bold text-base ${t.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                {t.type === 'income' ? '+' : '-'}
                              </div>
                              <div className="min-w-0 pr-2">
                                 <p className="font-bold text-slate-800 text-xs truncate">{t.category}</p>
                                 <p className="text-[10px] text-slate-500 font-medium truncate mt-0.5">{formatDateText(t.date)} {t.note && <span>• {t.note}</span>}</p>
                              </div>
                            </div>
                            
                            <div className="flex flex-col items-end gap-1 flex-shrink-0">
                              <span className={`font-bold text-sm ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-800'}`}>
                                  {t.type === 'income' ? '+' : ''}{formatCurrency(t.amount)}
                              </span>
                              
                              <div className="flex items-center gap-1.5 mt-0.5">
                                  <button onClick={()=>setEditingTx(t)} className="text-slate-300 hover:text-blue-500 p-1 bg-slate-50 rounded-md transition-colors border border-slate-100">
                                      <Icons.Edit />
                                  </button>
                                  <button onClick={()=>{ if(confirm('ต้องการลบรายการนี้?')) setTx(tx.filter(x=>x.id!==t.id)) }} className="text-slate-300 hover:text-rose-500 p-1 bg-slate-50 rounded-md transition-colors border border-slate-100">
                                      <Icons.Trash />
                                  </button>
                              </div>
                            </div>
                            
                          </div>
                        ))}
                    </div>
                    }
                  </div>
                )}

                {tab === 'add' && (
                  <form onSubmit={handleAdd} className="animate-in fade-in duration-300">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-5">
                        
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                           {['income', 'expense'].map(tp => (
                               <button key={tp} type="button" onClick={()=>{
                                   const fallbackCat = cats[tp] && cats[tp].length > 0 ? cats[tp][0] : '';
                                   setForm({...form, type: tp, category: fallbackCat});
                               }} 
                                className={`flex-1 py-2 text-xs rounded-lg transition-all font-bold ${
                                    form.type === tp 
                                    ? (tp === 'income' ? 'bg-white shadow-sm text-emerald-500' : 'bg-white shadow-sm text-rose-500') 
                                    : 'text-slate-400 hover:text-slate-600'
                                }`}>
                                   {tp === 'income' ? 'รายรับ' : 'รายจ่าย'}
                               </button>
                           ))}
                        </div>
                        
                        <div className={`text-center py-7 rounded-2xl border transition-all duration-300 ${form.amount ? 'bg-white border-slate-200 shadow-sm' : 'bg-slate-50 border-slate-100'}`}>
                           <input type="number" step="0.01" required placeholder="0" value={form.amount} onChange={e=>setForm({...form, amount: e.target.value})} 
                            className={`w-full text-5xl fon
