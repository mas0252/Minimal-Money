<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Money</title>
    <!-- โหลดสิ่งที่จำเป็นก่อน -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
        body { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; background: transparent; }
        @media print {
            body { background: white !important; }
            .print\:hidden { display: none !important; }
        }
        /* ป้องกันจอกระตุกบนมือถือเวลาพิมพ์ */
        input, select, button { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 flex justify-center">
    <div id="root" class="w-full max-w-md min-h-screen bg-white flex flex-col relative shadow-2xl overflow-hidden">
        <!-- แสดงข้อความนี้ชั่วคราวก่อนแอปจะโหลดเสร็จ เพื่อไม่ให้จอขาว -->
        <div id="loader" class="flex flex-col items-center justify-center h-screen space-y-4">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-400 text-sm">กำลังเปิดแอป...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ไอคอน SVG (ใส่ไว้ในโค้ดเพื่อความเสถียร) ---
        const Icons = {
            Home: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            List: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Plus: () => <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Settings: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        };

        const THEMES = {
            blue: { id: 'blue', primary: 'bg-blue-500', text: 'text-blue-500' },
            green: { id: 'green', primary: 'bg-emerald-500', text: 'text-emerald-500' },
            peach: { id: 'peach', primary: 'bg-orange-400', text: 'text-orange-400' },
            slate: { id: 'slate', primary: 'bg-slate-700', text: 'text-slate-700' },
        };

        const DEFAULT_CATS = {
            income: ['เงินเดือน', 'รายได้เสริม', 'โบนัส', 'อื่นๆ'],
            expense: ['อาหาร', 'เดินทาง', 'ของใช้', 'ค่าเช่า', 'อื่นๆ']
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [tx, setTx] = useState(() => {
                try { return JSON.parse(localStorage.getItem('min_tx') || '[]'); } 
                catch(e) { return []; }
            });
            const [theme, setTheme] = useState(() => {
                const id = localStorage.getItem('min_theme') || 'blue';
                return THEMES[id] || THEMES.blue;
            });
            const [month, setMonth] = useState(new Date().toISOString().substring(0, 7));
            const [form, setForm] = useState({ type: 'expense', amt: '', cat: '', date: new Date().toISOString().split('T')[0] });

            useEffect(() => {
                localStorage.setItem('min_tx', JSON.stringify(tx));
                localStorage.setItem('min_theme', theme.id);
                // ซ่อน Loader เมื่อ React พร้อมทำงาน
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            }, [tx, theme]);

            const filtered = useMemo(() => tx.filter(t => t.date.startsWith(month)).sort((a,b) => new Date(b.date)-new Date(a.date)), [tx, month]);
            const summary = useMemo(() => {
                let inc = 0, exp = 0;
                filtered.forEach(t => t.type === 'income' ? inc += t.amt : exp += t.amt);
                return { inc, exp, bal: inc - exp };
            }, [filtered]);

            return (
                <div className="flex flex-col h-screen animate-in fade-in duration-500">
                    <header className={`${theme.primary} p-5 pt-8 text-white flex justify-between items-center shadow-md print:hidden transition-colors`}>
                        <h1 className="text-xl font-bold">Minimal Money</h1>
                        <input type="month" value={month} onChange={e=>setMonth(e.target.value)} className="bg-white/20 border-none rounded-lg px-2 text-sm outline-none text-white h-8"/>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 custom-scrollbar pb-24">
                        {tab === 'dashboard' && (
                            <div className="space-y-4">
                                <div className={`${theme.primary} rounded-2xl p-6 text-white shadow-lg transition-colors`}>
                                    <p className="text-xs opacity-80 mb-1">ยอดคงเหลือ</p>
                                    <h2 className="text-3xl font-bold">฿{summary.bal.toLocaleString()}</h2>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">Income</p>
                                        <p className="text-emerald-500 font-bold">฿{summary.inc.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">Expense</p>
                                        <p className="text-rose-500 font-bold">฿{summary.exp.toLocaleString()}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'list' && (
                            <div className="space-y-2">
                                {filtered.length === 0 ? <p className="text-center py-20 text-slate-300">ไม่มีข้อมูลเดือนนี้</p> : 
                                filtered.map(item => (
                                    <div key={item.id} className="bg-white p-3 rounded-xl border border-slate-50 shadow-sm flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs ${item.type === 'income' ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'}`}>
                                                {item.type === 'income' ? '+' : '-'}
                                            </div>
                                            <div>
                                                <p className="font-bold text-sm text-slate-700">{item.cat}</p>
                                                <p className="text-[10px] text-slate-400">{item.date}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <p className={`font-bold text-sm ${item.type === 'income' ? 'text-emerald-500' : 'text-slate-700'}`}>฿{item.amt.toLocaleString()}</p>
                                            <button onClick={()=>{ if(confirm('ลบรายการนี้?')) setTx(tx.filter(x=>x.id!==item.id)) }} className="text-slate-200 hover:text-rose-400"><Icons.Trash/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'add' && (
                            <form onSubmit={(e)=>{
                                e.preventDefault(); if(!form.amt || !form.cat) return;
                                setTx([{...form, amt: Number(form.amt), id: Date.now()}, ...tx]);
                                setForm({...form, amt: ''}); setTab('list');
                            }} className="bg-white p-6 rounded-3xl border shadow-xl space-y-5">
                                <div className="flex bg-slate-100 p-1 rounded-xl">
                                    {['expense', 'income'].map(tp => <button key={tp} type="button" onClick={()=>setForm({...form, type: tp, cat: ''})} className={`flex-1 py-2 text-xs rounded-lg ${form.type === tp ? 'bg-white shadow font-bold text-slate-800' : 'text-slate-400'}`}>{tp === 'expense' ? 'รายจ่าย' : 'รายรับ'}</button>)}
                                </div>
                                <input type="number" step="0.01" required placeholder="0.00" value={form.amt} onChange={e=>setForm({...form, amt: e.target.value})} className="w-full text-4xl font-bold text-center border-none outline-none py-4 focus:ring-0"/>
                                <div className="grid grid-cols-2 gap-2">
                                    {DEFAULT_CATS[form.type].map(c => <button key={c} type="button" onClick={()=>setForm({...form, cat: c})} className={`p-3 text-[10px] font-bold rounded-xl border truncate ${form.cat === c ? `${theme.primary} text-white` : 'bg-white text-slate-500'}`}>{c}</button>)}
                                </div>
                                <input type="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl text-xs border-none outline-none"/>
                                <button type="submit" className={`w-full py-4 rounded-2xl text-white font-bold ${theme.primary} shadow-lg active:scale-95 transition-transform`}>บันทึกรายการ</button>
                            </form>
                        )}

                        {tab === 'settings' && (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-xl border shadow-sm">
                                    <p className="text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-widest">เลือกสีธีม</p>
                                    <div className="flex gap-4">
                                        {Object.values(THEMES).map(t => <button key={t.id} onClick={()=>setTheme(t)} className={`w-12 h-12 rounded-2xl shadow-md ${t.primary} ${theme.id === t.id ? 'ring-4 ring-slate-100 scale-110' : 'opacity-40'}`}/>)}
                                    </div>
                                </div>
                                <button onClick={()=>{ if(confirm('ล้างข้อมูลทั้งหมด?')) setTx([]); }} className="w-full p-4 bg-rose-50 text-rose-500 rounded-2xl text-[10px] font-bold uppercase tracking-widest">ล้างข้อมูลทั้งหมด</button>
                            </div>
                        )}
                    </main>

                    {/* Navigation */}
                    <nav className="bg-white/80 backdrop-blur-md border-t p-4 pb-8 flex justify-around items-center fixed bottom-0 left-0 right-0 max-w-md mx-auto print:hidden z-40">
                        <button onClick={()=>setTab('dashboard')} className={tab === 'dashboard' ? theme.text : 'text-slate-300'}><Icons.Home/></button>
                        <button onClick={()=>setTab('list')} className={tab === 'list' ? theme.text : 'text-slate-300'}><Icons.List/></button>
                        <div className="relative -top-8">
                            <button onClick={()=>setTab('add')} className={`w-14 h-14 rounded-full flex items-center justify-center text-white shadow-2xl transition-all active:scale-90 ${theme.primary}`}><Icons.Plus/></button>
                        </div>
                        <button onClick={()=>setTab('settings')} className={tab === 'settings' ? theme.text : 'text-slate-300'}><Icons.Settings/></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
